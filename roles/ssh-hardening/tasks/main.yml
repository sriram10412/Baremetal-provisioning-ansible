---
# ══════════════════════════════════════════
# ROLE: ssh-hardening
# Hardens SSH daemon to CIS benchmark level
# Key-based auth only, no root login,
# strong ciphers, strict timeouts
# ══════════════════════════════════════════

# ── 1. BACKUP ORIGINAL SSHD CONFIG ──
- name: Backup original sshd_config
  ansible.builtin.copy:
    src: /etc/ssh/sshd_config
    dest: /etc/ssh/sshd_config.bak.{{ ansible_date_time.date }}
    remote_src: true
    owner: root
    group: root
    mode: '0600'
    force: false    # don't overwrite existing backup

# ── 2. DEPLOY HARDENED SSHD CONFIG ──
- name: Deploy hardened sshd_config
  ansible.builtin.template:
    src: sshd_config.j2
    dest: /etc/ssh/sshd_config
    owner: root
    group: root
    mode: '0600'
    validate: /usr/sbin/sshd -t -f %s   # validate before applying!
  notify: restart sshd

# ── 3. REMOVE WEAK MODULI ──
# Moduli smaller than 3072 bits are considered weak
- name: Remove weak SSH moduli (< 3072 bits)
  ansible.builtin.shell: |
    awk '$5 >= 3071' /etc/ssh/moduli > /tmp/moduli.safe
    mv /tmp/moduli.safe /etc/ssh/moduli
  args:
    creates: /etc/ssh/.moduli-hardened
  notify: restart sshd

- name: Mark moduli as hardened
  ansible.builtin.file:
    path: /etc/ssh/.moduli-hardened
    state: touch
    mode: '0600'

# ── 4. GENERATE STRONG HOST KEYS ──
- name: Remove weak ED DSA and RSA host keys
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/ssh/ssh_host_dsa_key
    - /etc/ssh/ssh_host_dsa_key.pub
    - /etc/ssh/ssh_host_ecdsa_key
    - /etc/ssh/ssh_host_ecdsa_key.pub
  notify: restart sshd

- name: Generate strong Ed25519 host key
  ansible.builtin.command:
    cmd: ssh-keygen -t ed25519 -f /etc/ssh/ssh_host_ed25519_key -N ""
    creates: /etc/ssh/ssh_host_ed25519_key
  notify: restart sshd

- name: Generate strong RSA 4096 host key
  ansible.builtin.command:
    cmd: ssh-keygen -t rsa -b 4096 -f /etc/ssh/ssh_host_rsa_key -N ""
    creates: /etc/ssh/ssh_host_rsa_key
  notify: restart sshd

- name: Set strict permissions on host keys
  ansible.builtin.file:
    path: "{{ item.path }}"
    owner: root
    group: root
    mode: "{{ item.mode }}"
  loop:
    - { path: '/etc/ssh/ssh_host_ed25519_key',     mode: '0600' }
    - { path: '/etc/ssh/ssh_host_ed25519_key.pub',  mode: '0644' }
    - { path: '/etc/ssh/ssh_host_rsa_key',          mode: '0600' }
    - { path: '/etc/ssh/ssh_host_rsa_key.pub',      mode: '0644' }

# ── 5. CONFIGURE SSH ALLOW LIST ──
- name: Ensure SSH AllowUsers is configured
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^AllowUsers'
    line: "AllowUsers {{ ssh_allowed_users | join(' ') }}"
    state: present
    validate: /usr/sbin/sshd -t -f %s
  notify: restart sshd

# ── 6. ENABLE AND START SSHD ──
- name: Ensure SSH is enabled and running
  ansible.builtin.service:
    name: sshd
    state: started
    enabled: true
